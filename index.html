<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing · Reader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#0B0B0F;
  --surface:#13131A;
  --surface-2:#1C1C26;
  --text:#EDEAE2;
  --text-muted:#8B8A84;
  --cyan:#00B4D8;
  --orange:#E8823A;
  --red:#F87171;
  --purple:#A78BFA;
  --pink:#F472B6;
  --green:#4ADE80;
  --blue:#60A5FA;
  --teal:#2DD4BF;
  --accent:var(--cyan);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ───────── SIDEBAR ───────── */
.sidebar{
  width:400px;
  flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--surface-2);
  display:flex;
  flex-direction:column;
  height:100%;
  transition:margin-left 0.25s ease;
}
.sidebar.collapsed{ margin-left:-400px; }

.brand{
  padding:26px 26px 20px;
  border-bottom:1px solid var(--surface-2);
  flex-shrink:0;
}
.brand h1{
  font-family:'Fraunces',serif;
  font-size:28px;
  font-weight:600;
  letter-spacing:-1px;
  line-height:1.05;
}
.brand .sub{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:2.5px;
  color:var(--text-muted);
  margin-top:8px;
}

.scroll{
  flex:1;
  overflow-y:auto;
  min-height:0;
}
.scroll::-webkit-scrollbar{width:8px;}
.scroll::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:8px;}

.sec-label{
  padding:20px 26px 10px;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--text-muted);
}

/* ── Sources nav ── */
.sources{ padding:0 14px; }
.source{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  text-align:left;
  background:transparent;
  border:none;
  border-radius:9px;
  padding:10px 14px;
  margin-bottom:2px;
  cursor:pointer;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:14px;
  transition:background 0.15s ease;
}
.source:hover{ background:var(--surface-2); }
.source .s-dot{
  width:11px;height:11px;border-radius:50%;
  flex-shrink:0;
  background:var(--sc, var(--text-muted));
  box-shadow:0 0 0 3px color-mix(in srgb, var(--sc, var(--text-muted)) 18%, transparent);
}
.source .s-name{ flex:1; }
.source .s-count{
  font-size:11px;
  color:var(--text-muted);
  background:var(--bg);
  border-radius:20px;
  padding:2px 9px;
  min-width:26px;
  text-align:center;
}
.source-more{
  padding:10px 16px 4px;
  font-size:11px;
  line-height:1.6;
  color:var(--text-muted);
}
.source-more .sm-label{
  display:block;
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:3px;
  opacity:0.7;
}

/* ── Archive calendar ── */
.cal{ padding:0 20px 8px; }
.cal-head{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}
.cal-title{
  font-family:'Fraunces',serif;
  font-size:17px; font-weight:600;
}
.cal-nav{
  background:var(--surface-2); border:none; color:var(--text);
  width:30px; height:30px; border-radius:8px;
  cursor:pointer; font-size:15px;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.15s ease;
}
.cal-nav:hover{ background:#262633; }
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:4px;
}
.cal-dow{ margin-bottom:6px; }
.cal-dow span{
  text-align:center;
  font-size:10px; font-weight:600; letter-spacing:0.5px;
  text-transform:uppercase;
  color:var(--text-muted);
  padding:2px 0;
}
.day{
  position:relative;
  aspect-ratio:1/1;
  display:flex; align-items:center; justify-content:center;
  border-radius:9px;
  font-size:13px;
  color:var(--text-muted);
  background:transparent;
  border:none;
  font-family:'Inter',sans-serif;
}
.day.blank{ visibility:hidden; }
.day.muted{ opacity:0.28; }
.day.has{
  color:var(--text);
  font-weight:600;
  background:var(--surface-2);
  cursor:pointer;
  transition:background 0.15s ease, transform 0.1s ease;
}
.day.has:hover{ background:#2a2a38; }
.day.active{
  background:var(--accent);
  color:var(--bg);
}
.day.today{ box-shadow:inset 0 0 0 1.5px var(--text-muted); }
.day.today.active{ box-shadow:inset 0 0 0 1.5px var(--accent); }
.day.has.read:not(.active){ opacity:0.5; }
.day .cdot{
  position:absolute;
  bottom:4px; left:50%; transform:translateX(-50%);
  width:4px; height:4px; border-radius:50%;
  background:var(--accent);
}
.day.flag .cdot{ background:var(--orange); }
.day.active .cdot{ background:var(--bg); }
.cal-hint{
  margin-top:14px;
  font-size:11px; line-height:1.5;
  color:var(--text-muted);
  display:flex; flex-direction:column; gap:5px;
}
.cal-hint .row{ display:flex; align-items:center; gap:7px; }
.cal-hint .swatch{ width:9px;height:9px;border-radius:50%;flex-shrink:0; }

/* ── Back to top (pinned bottom) ── */
.sidebar-foot{
  flex-shrink:0;
  padding:14px 18px 18px;
  border-top:1px solid var(--surface-2);
}
.toptop{
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%;
  background:var(--surface-2);
  border:none; border-radius:10px;
  padding:13px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:12px; font-weight:600;
  text-transform:uppercase; letter-spacing:1.5px;
  cursor:pointer;
  transition:background 0.15s ease;
}
.toptop:hover{ background:#262633; }

/* ───────── MAIN ───────── */
.main{ flex:1; display:flex; flex-direction:column; min-width:0; }
.topbar{
  display:flex; align-items:center; gap:14px;
  padding:14px 22px;
  background:var(--surface);
  border-bottom:1px solid var(--surface-2);
  overflow:hidden;
  max-height:80px;
  transition:max-height 0.28s ease, padding 0.28s ease, opacity 0.2s ease, border-color 0.2s ease;
}
.topbar.hidden{
  max-height:0; padding-top:0; padding-bottom:0; opacity:0; border-color:transparent; pointer-events:none;
}
.iconbtn{
  background:var(--surface-2); border:none; color:var(--text);
  width:38px; height:38px; border-radius:9px;
  cursor:pointer; font-size:17px;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.15s ease, opacity 0.15s ease;
}
.iconbtn:hover{ background:#262633; }
.iconbtn:disabled{ opacity:0.3; cursor:default; }
.now-showing{ flex:1; min-width:0; }
.now-showing .ns-title{ font-family:'Fraunces',serif; font-size:19px; font-weight:600; }
.now-showing .ns-sub{
  font-size:11px; text-transform:uppercase; letter-spacing:2px;
  color:var(--text-muted); margin-top:2px;
}
.openbtn{
  text-decoration:none; color:var(--text-muted); font-size:12px;
  border:1px solid var(--surface-2); border-radius:8px; padding:9px 14px;
  transition:color 0.15s ease, border-color 0.15s ease; white-space:nowrap;
}
.openbtn:hover{ color:var(--text); border-color:var(--text-muted); }

.viewer{ flex:1; position:relative; background:var(--bg); }
.viewer iframe{ width:100%; height:100%; border:none; display:block; }

.state{
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:14px; color:var(--text-muted); font-size:14px; text-align:center; padding:24px;
}
.state.hidden{ display:none; }
.spinner{
  width:34px;height:34px;
  border:3px solid var(--surface-2); border-top-color:var(--accent);
  border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

.scrim{
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  opacity:0; pointer-events:none; transition:opacity 0.2s ease; z-index:5;
}
@media (max-width:820px){
  .sidebar{ position:fixed; z-index:10; left:0; top:0; box-shadow:0 0 40px rgba(0,0,0,0.6); }
  .sidebar:not(.collapsed) ~ .scrim{ opacity:1; pointer-events:auto; }
  .now-showing .ns-title{ font-size:16px; }
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <h1>Morning<br>Briefing</h1>
    <div class="sub">Daily Intelligence Reader</div>
  </div>

  <div class="scroll">
    <div class="sec-label">Jump to Source</div>
    <div class="sources" id="sources"></div>

    <div class="sec-label">Archive</div>
    <div class="cal" id="cal">
      <div class="cal-head">
        <button class="cal-nav" id="calPrev" title="Previous month">‹</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" id="calNext" title="Next month">›</button>
      </div>
      <div class="cal-grid cal-dow">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
      <div class="cal-grid" id="calDays"></div>
      <div class="cal-hint">
        <div class="row"><span class="swatch" style="background:var(--accent)"></span>Briefing available · click to read</div>
        <div class="row"><span class="swatch" style="background:var(--orange)"></span>Has flagged stories</div>
        <div class="row"><span class="swatch" style="background:var(--surface-2);opacity:0.6"></span>Already read</div>
      </div>
    </div>
  </div>

  <div class="sidebar-foot">
    <button class="toptop" id="topBtn">↑ Back to top</button>
  </div>
</aside>

<div class="scrim" id="scrim"></div>

<div class="main">
  <div class="topbar">
    <button class="iconbtn" id="toggleBtn" title="Toggle sidebar (a)">☰</button>
    <button class="iconbtn" id="prevBtn" title="Older (←)">‹</button>
    <button class="iconbtn" id="nextBtn" title="Newer (→)">›</button>
    <div class="now-showing">
      <div class="ns-title" id="nsTitle">Loading…</div>
      <div class="ns-sub" id="nsSub"></div>
    </div>
    <a class="openbtn" id="openBtn" target="_blank" rel="noopener">Open full page ↗</a>
  </div>
  <div class="viewer">
    <iframe id="viewer" title="Briefing"></iframe>
    <div class="state" id="loadState">
      <div class="spinner"></div>
      <div>Loading briefing…</div>
    </div>
    <div class="state hidden" id="errState">
      <div style="font-size:34px">📭</div>
      <div id="errMsg">No briefings found.</div>
    </div>
  </div>
</div>

<script>
const MANIFEST_URL = "briefings/index.json";
const SOURCES_URL  = "briefings/sources.json";

/* Source roster + colors are loaded from sources.json (single source of truth).
   This is the fallback if that file can't be fetched. */
let SOURCES = [
  {key:"hn",       name:"Hacker News",      color:"#00B4D8"},
  {key:"bc",       name:"BleepingComputer", color:"#E8823A"},
  {key:"reg",      name:"The Register",     color:"#F87171"},
  {key:"dr",       name:"Dark Reading",     color:"#A78BFA"},
  {key:"fortinet", name:"Fortinet",         color:"#2DD4BF"},
  {key:"eng",      name:"Engadget",         color:"#F472B6"},
  {key:"aws",      name:"AWS",              color:"#4ADE80"},
  {key:"azure",    name:"Azure",            color:"#60A5FA"},
];
let LABEL_TO_KEY = {};

function rebuildLabelMap(){
  LABEL_TO_KEY = {};
  SOURCES.forEach(s => {
    LABEL_TO_KEY[s.name.toLowerCase()] = s.key;
    (s.aliases || []).forEach(a => { LABEL_TO_KEY[String(a).toLowerCase()] = s.key; });
  });
}

async function loadSources(){
  try{
    const res = await fetch(SOURCES_URL, {cache:"no-cache"});
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    if(Array.isArray(data.sources) && data.sources.length){
      SOURCES = data.sources.map(s => ({
        key:s.key, name:s.name, color:s.color || "var(--text-muted)", aliases:s.aliases || []
      }));
    }
  }catch(e){ /* keep fallback roster */ }
  rebuildLabelMap();
}

let briefings = [];   // newest-first
let current = -1;

/* Read/unread tracking. GitHub Pages is static (no server, no per-user accounts),
   so there's nowhere to store this except the browser itself — localStorage is the
   right tool here, not an analytics tracker (GA reports pageviews, not which dates
   *you* have opened). This is per-browser/device only; it won't sync across devices.
   A date only counts as read after READ_DWELL_MS of continuous dwell, so flipping
   past a day via next/prev or a stray click doesn't falsely mark it read. */
const READ_KEY = "mb_read_dates";
let readDates = new Set();
try { readDates = new Set(JSON.parse(localStorage.getItem(READ_KEY) || "[]")); } catch(e){}

function markRead(date){
  if(readDates.has(date)) return;
  readDates.add(date);
  try { localStorage.setItem(READ_KEY, JSON.stringify([...readDates])); } catch(e){}
  renderCalendar();
}

const READ_DWELL_MS = 10000; // must stay on a date this long before it counts as read
let readTimer = null;

function armReadTimer(date){
  clearTimeout(readTimer);
  readTimer = setTimeout(() => markRead(date), READ_DWELL_MS);
}

const $ = id => document.getElementById(id);

function todayISO(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

/* Identify a card's source: prefer src-* class, fall back to first non-radar chip text */
function cardSourceKey(card){
  for(const c of card.classList){
    if(c.startsWith("src-")) return c.slice(4);
  }
  const chip = card.querySelector(".chip:not(.radar)");
  if(chip){
    const key = LABEL_TO_KEY[chip.textContent.trim().toLowerCase()];
    if(key) return key;
  }
  return null;
}

/* Topbar auto-hide: listen to scroll inside the same-origin briefing iframe.
   Scrolling down hides the bar; scrolling up (or reaching the top) restores it. */
function attachTopbarScroll(win){
  const topbar = document.querySelector('.topbar');
  let lastY = 0;
  win.addEventListener('scroll', () => {
    const y = win.scrollY;
    const dy = y - lastY;
    lastY = y;
    if(dy > 8)       topbar.classList.add('hidden');
    else if(dy < -8) topbar.classList.remove('hidden');
    if(y <= 0)       topbar.classList.remove('hidden');
  }, {passive:true});
}

/* After the iframe loads: hide its inline legend, then build the source nav */
function onFrameReady(){
  $("loadState").classList.add("hidden");
  let doc = null;
  try { doc = $("viewer").contentDocument; } catch(e){ /* cross-origin */ }
  buildSources(doc);
  try { attachTopbarScroll($("viewer").contentWindow); } catch(e){}
}

function buildSources(doc){
  const wrap = $("sources");
  wrap.innerHTML = "";

  // Move sources "out of" the briefing: hide the in-page legend bar.
  const firstCardByKey = {};
  const counts = {};
  if(doc){
    const legend = doc.querySelector(".legend");
    if(legend) legend.style.display = "none";

    doc.querySelectorAll(".card").forEach(card => {
      const key = cardSourceKey(card);
      if(!key) return;
      counts[key] = (counts[key]||0) + 1;
      if(!firstCardByKey[key]) firstCardByKey[key] = card;
    });
  }

  // Present sources first (in roster order); absent ones collapse below.
  const present = SOURCES.filter(s => (counts[s.key]||0) > 0);
  const absent  = SOURCES.filter(s => (counts[s.key]||0) === 0);

  present.forEach(src => {
    const n = counts[src.key];
    const btn = document.createElement("button");
    btn.className = "source";
    btn.style.setProperty("--sc", src.color);
    btn.innerHTML =
      `<span class="s-dot"></span>` +
      `<span class="s-name">${src.name}</span>` +
      `<span class="s-count">${n}</span>`;
    btn.addEventListener("click", () => {
      const el = firstCardByKey[src.key];
      if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
      if(window.innerWidth <= 820) closeSidebar();
    });
    wrap.appendChild(btn);
  });

  if(absent.length){
    const more = document.createElement("div");
    more.className = "source-more";
    more.innerHTML = `<span class="sm-label">Also monitoring</span> ` +
      absent.map(s => s.name).join(" · ");
    wrap.appendChild(more);
  }
}

function scrollFrameTop(){
  try { $("viewer").contentWindow.scrollTo({top:0, behavior:"smooth"}); } catch(e){}
}

function show(idx){
  if(idx < 0 || idx >= briefings.length) return;
  current = idx;
  const b = briefings[idx];

  $("loadState").classList.remove("hidden");
  $("errState").classList.add("hidden");
  $("sources").innerHTML = "";
  const frame = $("viewer");
  frame.onload = onFrameReady;
  frame.src = b.file;

  $("nsTitle").textContent = b.label;
  $("nsSub").textContent = b.weekday + " · " + b.stories + " stories · " + b.flagged + " flagged";
  $("openBtn").href = b.file;
  document.querySelector('.topbar').classList.remove('hidden');
  armReadTimer(b.date);

  $("nextBtn").disabled = idx <= 0;
  $("prevBtn").disabled = idx >= briefings.length - 1;

  // sync calendar to the selected briefing's month
  calYear = +b.date.slice(0,4);
  calMonth = +b.date.slice(5,7) - 1;
  renderCalendar();
  history.replaceState(null, "", "#" + b.date);

  if(window.innerWidth <= 820) closeSidebar();
}

const MONTHS = ["January","February","March","April","May","June",
  "July","August","September","October","November","December"];
const byDate = {};   // "YYYY-MM-DD" -> index into briefings
let calYear, calMonth;

function pad(n){ return String(n).padStart(2,"0"); }

function renderCalendar(){
  $("calTitle").textContent = MONTHS[calMonth] + " " + calYear;
  const grid = $("calDays");
  grid.innerHTML = "";
  const today = todayISO();
  const selDate = (current >= 0) ? briefings[current].date : null;

  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  for(let i = 0; i < firstDow; i++){
    const b = document.createElement("div");
    b.className = "day blank";
    grid.appendChild(b);
  }
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = calYear + "-" + pad(calMonth + 1) + "-" + pad(d);
    const idx = byDate[dateStr];
    const has = idx !== undefined;
    const cell = document.createElement(has ? "button" : "div");
    cell.className = "day " + (has ? "has" : "muted");
    if(has && briefings[idx].flagged) cell.classList.add("flag");
    if(has && readDates.has(dateStr)) cell.classList.add("read");
    if(dateStr === today) cell.classList.add("today");
    if(dateStr === selDate) cell.classList.add("active");
    cell.innerHTML = d + (has ? `<span class="cdot"></span>` : ``);
    if(has){
      const b = briefings[idx];
      cell.title = `${b.weekday} · ${b.stories} stories · ${b.flagged} flagged`;
      cell.addEventListener("click", () => show(idx));
    }
    grid.appendChild(cell);
  }
}

function calShift(delta){
  calMonth += delta;
  if(calMonth < 0){ calMonth = 11; calYear--; }
  else if(calMonth > 11){ calMonth = 0; calYear++; }
  renderCalendar();
}

function pickInitial(){
  const hash = location.hash.replace("#","");
  let idx = briefings.findIndex(b => b.date === hash);
  if(idx >= 0) return idx;
  idx = briefings.findIndex(b => b.date === todayISO());
  if(idx >= 0) return idx;
  return 0;
}

function closeSidebar(){ $("sidebar").classList.add("collapsed"); }
function toggleSidebar(){ $("sidebar").classList.toggle("collapsed"); }

async function init(){
  await loadSources();
  try{
    const res = await fetch(MANIFEST_URL, {cache:"no-cache"});
    if(!res.ok) throw new Error("manifest " + res.status);
    const data = await res.json();
    briefings = (data.briefings || []).slice().sort((a,b) => b.date.localeCompare(a.date));
    if(!briefings.length) throw new Error("empty");
    briefings.forEach((b,i) => { byDate[b.date] = i; });
    show(pickInitial());
  }catch(err){
    $("loadState").classList.add("hidden");
    $("errState").classList.remove("hidden");
    $("errMsg").textContent =
      "Couldn't load briefings (" + err.message + "). " +
      "Make sure briefings/index.json is deployed alongside this page.";
  }
}

$("toggleBtn").addEventListener("click", toggleSidebar);
$("scrim").addEventListener("click", closeSidebar);
$("prevBtn").addEventListener("click", () => show(current + 1));
$("nextBtn").addEventListener("click", () => show(current - 1));
$("topBtn").addEventListener("click", scrollFrameTop);
$("calPrev").addEventListener("click", () => calShift(-1));
$("calNext").addEventListener("click", () => calShift(1));
document.addEventListener("keydown", e => {
  if(e.target.tagName === "INPUT") return;
  if(e.key === "ArrowLeft")  show(current + 1);
  if(e.key === "ArrowRight") show(current - 1);
  if(e.key.toLowerCase() === "a") toggleSidebar();
});

if(window.innerWidth <= 820) closeSidebar();
init();
</script>
</body>
</html>
