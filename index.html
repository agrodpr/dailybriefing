<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Briefing · Reader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#0B0B0F;
  --surface:#13131A;
  --surface-2:#1C1C26;
  --text:#EDEAE2;
  --text-muted:#8B8A84;
  --cyan:#00B4D8;
  --orange:#E8823A;
  --accent:var(--cyan);
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{height:100%;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* ───────── SIDEBAR ───────── */
.sidebar{
  width:340px;
  flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--surface-2);
  display:flex;
  flex-direction:column;
  height:100%;
  transition:margin-left 0.25s ease;
}

.sidebar.collapsed{
  margin-left:-340px;
}

.brand{
  padding:28px 24px 20px;
  border-bottom:1px solid var(--surface-2);
}

.brand h1{
  font-family:'Fraunces',serif;
  font-size:26px;
  font-weight:600;
  letter-spacing:-1px;
  line-height:1.1;
}

.brand .sub{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:2.5px;
  color:var(--text-muted);
  margin-top:8px;
}

.archive-label{
  padding:18px 24px 8px;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--text-muted);
}

.timeline{
  flex:1;
  overflow-y:auto;
  padding:0 14px 24px;
}

.timeline::-webkit-scrollbar{width:8px;}
.timeline::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:8px;}

.entry{
  position:relative;
  display:block;
  width:100%;
  text-align:left;
  background:transparent;
  border:none;
  border-radius:10px;
  padding:14px 16px 14px 30px;
  margin-bottom:4px;
  cursor:pointer;
  color:var(--text);
  font-family:'Inter',sans-serif;
  transition:background 0.15s ease;
}

.entry:hover{background:var(--surface-2);}

.entry.active{background:var(--surface-2);}

/* timeline dot + connector */
.entry::before{
  content:"";
  position:absolute;
  left:13px; top:20px;
  width:9px; height:9px;
  border-radius:50%;
  background:var(--surface-2);
  border:2px solid var(--text-muted);
  transition:all 0.15s ease;
}
.entry.active::before{
  background:var(--accent);
  border-color:var(--accent);
  box-shadow:0 0 0 4px color-mix(in srgb, var(--accent) 25%, transparent);
}
.entry::after{
  content:"";
  position:absolute;
  left:17px; top:29px;
  width:1px;
  height:calc(100% - 12px);
  background:var(--surface-2);
}
.entry:last-child::after{display:none;}

.entry .e-date{
  font-size:15px;
  font-weight:600;
}
.entry .e-day{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--text-muted);
  margin-top:2px;
}
.entry .e-meta{
  font-size:11px;
  color:var(--text-muted);
  margin-top:8px;
  display:flex;
  gap:10px;
  align-items:center;
}
.entry .badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  background:var(--bg);
  border-radius:20px;
  padding:2px 8px;
}
.entry .badge.flag{
  color:var(--orange);
}
.entry .today-tag{
  display:inline-block;
  font-size:9px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--bg);
  background:var(--accent);
  border-radius:20px;
  padding:2px 7px;
  margin-left:8px;
  vertical-align:middle;
}

/* ───────── MAIN ───────── */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}

.topbar{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 22px;
  background:var(--surface);
  border-bottom:1px solid var(--surface-2);
}

.iconbtn{
  background:var(--surface-2);
  border:none;
  color:var(--text);
  width:38px; height:38px;
  border-radius:9px;
  cursor:pointer;
  font-size:17px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.15s ease, opacity 0.15s ease;
}
.iconbtn:hover{background:#262633;}
.iconbtn:disabled{opacity:0.3;cursor:default;}

.now-showing{
  flex:1;
  min-width:0;
}
.now-showing .ns-title{
  font-family:'Fraunces',serif;
  font-size:19px;
  font-weight:600;
}
.now-showing .ns-sub{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:2px;
  color:var(--text-muted);
  margin-top:2px;
}

.openbtn{
  text-decoration:none;
  color:var(--text-muted);
  font-size:12px;
  border:1px solid var(--surface-2);
  border-radius:8px;
  padding:9px 14px;
  transition:color 0.15s ease, border-color 0.15s ease;
  white-space:nowrap;
}
.openbtn:hover{color:var(--text);border-color:var(--text-muted);}

.viewer{
  flex:1;
  position:relative;
  background:var(--bg);
}
.viewer iframe{
  width:100%;
  height:100%;
  border:none;
  display:block;
}

/* loading / empty states */
.state{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  color:var(--text-muted);
  font-size:14px;
  text-align:center;
  padding:24px;
}
.state.hidden{display:none;}
.spinner{
  width:34px;height:34px;
  border:3px solid var(--surface-2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* mobile */
.scrim{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.5);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s ease;
  z-index:5;
}
@media (max-width:760px){
  .sidebar{
    position:fixed;z-index:10;left:0;top:0;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
  }
  .sidebar:not(.collapsed) ~ .scrim{opacity:1;pointer-events:auto;}
  .now-showing .ns-title{font-size:16px;}
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="brand">
    <h1>Morning<br>Briefing</h1>
    <div class="sub">Daily Intelligence Reader</div>
  </div>
  <div class="archive-label">Archive</div>
  <div class="timeline" id="timeline"></div>
</aside>

<div class="scrim" id="scrim"></div>

<div class="main">
  <div class="topbar">
    <button class="iconbtn" id="toggleBtn" title="Toggle archive (a)">☰</button>
    <button class="iconbtn" id="prevBtn" title="Older (←)">‹</button>
    <button class="iconbtn" id="nextBtn" title="Newer (→)">›</button>
    <div class="now-showing">
      <div class="ns-title" id="nsTitle">Loading…</div>
      <div class="ns-sub" id="nsSub"></div>
    </div>
    <a class="openbtn" id="openBtn" target="_blank" rel="noopener">Open full page ↗</a>
  </div>
  <div class="viewer">
    <iframe id="viewer" title="Briefing"></iframe>
    <div class="state" id="loadState">
      <div class="spinner"></div>
      <div>Loading briefing…</div>
    </div>
    <div class="state hidden" id="errState">
      <div style="font-size:34px">📭</div>
      <div id="errMsg">No briefings found.</div>
    </div>
  </div>
</div>

<script>
const MANIFEST_URL = "briefings/index.json";
let briefings = [];   // newest-first
let current = -1;

const $ = id => document.getElementById(id);

function todayISO(){
  const d = new Date();
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0");
}

function show(idx){
  if(idx < 0 || idx >= briefings.length) return;
  current = idx;
  const b = briefings[idx];

  // viewer
  $("loadState").classList.remove("hidden");
  $("errState").classList.add("hidden");
  const frame = $("viewer");
  frame.onload = () => $("loadState").classList.add("hidden");
  frame.src = b.file;

  // topbar
  $("nsTitle").textContent = b.label;
  $("nsSub").textContent = b.weekday + " · " + b.stories + " stories · " +
    b.flagged + " flagged";
  $("openBtn").href = b.file;

  // nav buttons (newest-first: idx 0 = newest)
  $("nextBtn").disabled = idx <= 0;            // newer
  $("prevBtn").disabled = idx >= briefings.length - 1; // older

  // active entry
  document.querySelectorAll(".entry").forEach((el,i) =>
    el.classList.toggle("active", i === idx));

  // url hash for deep-linking / refresh persistence
  history.replaceState(null, "", "#" + b.date);

  if(window.innerWidth <= 760) closeSidebar();
}

function buildTimeline(){
  const tl = $("timeline");
  const today = todayISO();
  tl.innerHTML = "";
  briefings.forEach((b,i) => {
    const btn = document.createElement("button");
    btn.className = "entry";
    const isToday = b.date === today;
    btn.innerHTML =
      `<div class="e-date">${b.label.replace(", "+b.date.slice(0,4),"")}` +
        (isToday ? `<span class="today-tag">Today</span>` : ``) + `</div>` +
      `<div class="e-day">${b.weekday}</div>` +
      `<div class="e-meta">` +
        `<span class="badge">📰 ${b.stories}</span>` +
        (b.flagged ? `<span class="badge flag">⚡ ${b.flagged}</span>` : ``) +
      `</div>`;
    btn.addEventListener("click", () => show(i));
    tl.appendChild(btn);
  });
}

function pickInitial(){
  const hash = location.hash.replace("#","");
  let idx = briefings.findIndex(b => b.date === hash);
  if(idx >= 0) return idx;
  // default to today if present
  idx = briefings.findIndex(b => b.date === todayISO());
  if(idx >= 0) return idx;
  // otherwise newest (index 0, since sorted newest-first)
  return 0;
}

function closeSidebar(){ $("sidebar").classList.add("collapsed"); }
function toggleSidebar(){ $("sidebar").classList.toggle("collapsed"); }

async function init(){
  try{
    const res = await fetch(MANIFEST_URL, {cache:"no-cache"});
    if(!res.ok) throw new Error("manifest " + res.status);
    const data = await res.json();
    briefings = (data.briefings || []).slice()
      .sort((a,b) => b.date.localeCompare(a.date)); // newest first
    if(!briefings.length) throw new Error("empty");
    buildTimeline();
    show(pickInitial());
  }catch(err){
    $("loadState").classList.add("hidden");
    $("errState").classList.remove("hidden");
    $("errMsg").textContent =
      "Couldn't load briefings (" + err.message + "). " +
      "Make sure briefings/index.json is deployed alongside this page.";
  }
}

// controls
$("toggleBtn").addEventListener("click", toggleSidebar);
$("scrim").addEventListener("click", closeSidebar);
$("prevBtn").addEventListener("click", () => show(current + 1)); // older
$("nextBtn").addEventListener("click", () => show(current - 1)); // newer
document.addEventListener("keydown", e => {
  if(e.target.tagName === "INPUT") return;
  if(e.key === "ArrowLeft")  show(current + 1);  // older
  if(e.key === "ArrowRight") show(current - 1);  // newer
  if(e.key.toLowerCase() === "a") toggleSidebar();
});

// start collapsed on mobile
if(window.innerWidth <= 760) closeSidebar();

init();
</script>
</body>
</html>
